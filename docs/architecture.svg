<svg viewBox="0 0 960 680" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Background -->
  <rect width="960" height="680" fill="#0f1117"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">Cloud Asset Security Review — Architecture</text>

  <!-- AWS Cloud boundary -->
  <rect x="30" y="56" width="900" height="420" rx="12" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="50" y="78" fill="#6b7280" font-size="11" font-weight="600">AWS Account</text>

  <!-- ── Row 1: Trigger layer ───────────────────────────────────── -->
  <!-- CloudTrail box -->
  <rect x="60" y="92" width="140" height="60" rx="8" fill="#1e3a5f" stroke="#2563eb" stroke-width="1.5"/>
  <text x="130" y="118" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">CloudTrail</text>
  <text x="130" y="134" text-anchor="middle" fill="#60a5fa" font-size="9">API events</text>

  <!-- Arrow CloudTrail → EventBridge -->
  <line x1="200" y1="122" x2="258" y2="122" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="229" y="115" text-anchor="middle" fill="#6b7280" font-size="8">event</text>

  <!-- EventBridge box -->
  <rect x="260" y="92" width="140" height="60" rx="8" fill="#1e3a5f" stroke="#2563eb" stroke-width="1.5"/>
  <text x="330" y="118" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">EventBridge</text>
  <text x="330" y="134" text-anchor="middle" fill="#60a5fa" font-size="9">4 rules (EC2·ALB·APIGW·R53)</text>

  <!-- Arrow EventBridge → Discovery Lambda -->
  <line x1="400" y1="122" x2="458" y2="122" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Discovery Lambda -->
  <rect x="460" y="92" width="150" height="60" rx="8" fill="#1a3a2e" stroke="#10b981" stroke-width="1.5"/>
  <text x="535" y="114" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">Discovery Lambda</text>
  <text x="535" y="130" text-anchor="middle" fill="#34d399" font-size="9">parse event · register asset</text>
  <text x="535" y="143" text-anchor="middle" fill="#34d399" font-size="9">dedup by hostname</text>

  <!-- Arrow Discovery Lambda → SQS -->
  <line x1="610" y1="122" x2="668" y2="122" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SQS Queue -->
  <rect x="670" y="92" width="140" height="60" rx="8" fill="#2d1f3d" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="740" y="114" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">SQS FIFO Queue</text>
  <text x="740" y="130" text-anchor="middle" fill="#a78bfa" font-size="9">scan jobs · DLQ for failures</text>
  <text x="740" y="143" text-anchor="middle" fill="#a78bfa" font-size="9">concurrency = cost knob</text>

  <!-- ── Row 2: Scanner ─────────────────────────────────────────── -->
  <!-- Arrow SQS → Scanner Lambda -->
  <line x1="740" y1="152" x2="740" y2="185" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="752" y="172" fill="#6b7280" font-size="8">trigger</text>

  <!-- Scanner Lambda big box -->
  <rect x="200" y="188" width="680" height="190" rx="10" fill="#1a1f2e" stroke="#f59e0b" stroke-width="2"/>
  <text x="540" y="210" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">Scanner Lambda  (ephemeral · isolated · auto-cleaned)</text>

  <!-- Enrichment sub-box -->
  <rect x="220" y="222" width="290" height="140" rx="8" fill="#0f1420" stroke="#374151" stroke-width="1"/>
  <text x="365" y="242" text-anchor="middle" fill="#9ca3af" font-size="10" font-weight="600">① Asset Enrichment</text>

  <rect x="234" y="250" width="120" height="36" rx="5" fill="#1e2535" stroke="#374151" stroke-width="1"/>
  <text x="294" y="264" text-anchor="middle" fill="#d1d5db" font-size="9" font-weight="600">DNS Enricher</text>
  <text x="294" y="278" text-anchor="middle" fill="#9ca3af" font-size="8">A · AAAA · CNAME · PTR</text>

  <rect x="366" y="250" width="120" height="36" rx="5" fill="#1e2535" stroke="#374151" stroke-width="1"/>
  <text x="426" y="264" text-anchor="middle" fill="#d1d5db" font-size="9" font-weight="600">HTTP Enricher</text>
  <text x="426" y="278" text-anchor="middle" fill="#9ca3af" font-size="8">headers · tech fingerprint</text>

  <rect x="234" y="296" width="120" height="36" rx="5" fill="#1e2535" stroke="#374151" stroke-width="1"/>
  <text x="294" y="310" text-anchor="middle" fill="#d1d5db" font-size="9" font-weight="600">TLS Enricher</text>
  <text x="294" y="324" text-anchor="middle" fill="#9ca3af" font-size="8">cert · expiry · protocols</text>

  <rect x="366" y="296" width="120" height="36" rx="5" fill="#1e2535" stroke="#374151" stroke-width="1"/>
  <text x="426" y="310" text-anchor="middle" fill="#d1d5db" font-size="9" font-weight="600">Port Scanner</text>
  <text x="426" y="324" text-anchor="middle" fill="#9ca3af" font-size="8">14 targeted ports · TCP</text>

  <!-- Arrow between sub-boxes -->
  <line x1="510" y1="300" x2="530" y2="300" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow-sm)"/>

  <!-- Security Checks sub-box -->
  <rect x="534" y="222" width="330" height="140" rx="8" fill="#0f1420" stroke="#374151" stroke-width="1"/>
  <text x="699" y="242" text-anchor="middle" fill="#9ca3af" font-size="10" font-weight="600">② Security Checks</text>

  <rect x="548" y="250" width="92" height="36" rx="5" fill="#1e2535" stroke="#ef444455" stroke-width="1"/>
  <text x="594" y="264" text-anchor="middle" fill="#fca5a5" font-size="8.5" font-weight="600">Header Checks</text>
  <text x="594" y="278" text-anchor="middle" fill="#9ca3af" font-size="7.5">HSTS·CSP·CORS</text>

  <rect x="648" y="250" width="92" height="36" rx="5" fill="#1e2535" stroke="#ef444455" stroke-width="1"/>
  <text x="694" y="264" text-anchor="middle" fill="#fca5a5" font-size="8.5" font-weight="600">TLS Checks</text>
  <text x="694" y="278" text-anchor="middle" fill="#9ca3af" font-size="7.5">expiry·ciphers·proto</text>

  <rect x="748" y="250" width="100" height="36" rx="5" fill="#1e2535" stroke="#ef444455" stroke-width="1"/>
  <text x="798" y="264" text-anchor="middle" fill="#fca5a5" font-size="8.5" font-weight="600">Endpoint Checks</text>
  <text x="798" y="278" text-anchor="middle" fill="#9ca3af" font-size="7.5">.env·admin·swagger</text>

  <rect x="548" y="296" width="92" height="36" rx="5" fill="#1e2535" stroke="#ef444455" stroke-width="1"/>
  <text x="594" y="310" text-anchor="middle" fill="#fca5a5" font-size="8.5" font-weight="600">Port Checks</text>
  <text x="594" y="324" text-anchor="middle" fill="#9ca3af" font-size="7.5">redis·mysql·rdp</text>

  <rect x="648" y="296" width="196" height="36" rx="5" fill="#1e2535" stroke="#ef444455" stroke-width="1"/>
  <text x="746" y="310" text-anchor="middle" fill="#fca5a5" font-size="8.5" font-weight="600">DNS / Subdomain Takeover</text>
  <text x="746" y="324" text-anchor="middle" fill="#9ca3af" font-size="7.5">dangling CNAME · ownership tags</text>

  <!-- ── Row 3: LLM ─────────────────────────────────────────────── -->
  <!-- Arrow Scanner → LLM -->
  <line x1="480" y1="378" x2="370" y2="418" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LLM Review box -->
  <rect x="200" y="420" width="220" height="70" rx="8" fill="#1f1a2e" stroke="#ec4899" stroke-width="1.5"/>
  <text x="310" y="445" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="600">③ LLM Review (Claude)</text>
  <text x="310" y="461" text-anchor="middle" fill="#f472b6" font-size="9">synthesise · prioritise · attack scenarios</text>
  <text x="310" y="475" text-anchor="middle" fill="#f472b6" font-size="9">fallback: deterministic if no API key</text>

  <!-- Arrow Scanner → Report -->
  <line x1="560" y1="378" x2="620" y2="418" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Report Generator box -->
  <rect x="530" y="420" width="200" height="70" rx="8" fill="#1a2a1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="630" y="445" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">④ Report Generator</text>
  <text x="630" y="461" text-anchor="middle" fill="#4ade80" font-size="9">JSON + Markdown</text>
  <text x="630" y="475" text-anchor="middle" fill="#4ade80" font-size="9">CWE refs · evidence · remediation</text>

  <!-- Arrow Report → S3 -->
  <line x1="730" y1="455" x2="790" y2="455" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- S3 box -->
  <rect x="792" y="420" width="118" height="70" rx="8" fill="#1e2a1a" stroke="#16a34a" stroke-width="1.5"/>
  <text x="851" y="445" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">S3 Reports</text>
  <text x="851" y="461" text-anchor="middle" fill="#4ade80" font-size="9">365-day lifecycle</text>
  <text x="851" y="475" text-anchor="middle" fill="#4ade80" font-size="9">KMS encrypted</text>

  <!-- Arrow LLM → Slack -->
  <line x1="310" y1="490" x2="310" y2="530" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Slack box (outside AWS) -->
  <rect x="200" y="532" width="220" height="55" rx="8" fill="#1a1a2e" stroke="#818cf8" stroke-width="1.5"/>
  <text x="310" y="555" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="600">⑤ Slack Alert</text>
  <text x="310" y="571" text-anchor="middle" fill="#818cf8" font-size="9">CRITICAL / HIGH findings · AI summary</text>

  <!-- SQLite / Registry -->
  <rect x="530" y="532" width="200" height="55" rx="8" fill="#1e1e2a" stroke="#6366f1" stroke-width="1.5"/>
  <text x="630" y="555" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="600">Asset Registry</text>
  <text x="630" y="571" text-anchor="middle" fill="#818cf8" font-size="9">SQLite → DynamoDB at scale</text>

  <!-- CloudWatch (CW alarm on DLQ) -->
  <rect x="792" y="532" width="118" height="55" rx="8" fill="#1e2030" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="851" y="552" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">CloudWatch</text>
  <text x="851" y="566" text-anchor="middle" fill="#60a5fa" font-size="8.5">DLQ alarm</text>
  <text x="851" y="578" text-anchor="middle" fill="#60a5fa" font-size="8.5">Lambda errors</text>

  <!-- Legend -->
  <rect x="30" y="606" width="900" height="62" rx="8" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <text x="50" y="624" fill="#9ca3af" font-size="10" font-weight="600">Legend</text>
  <rect x="50" y="632" width="12" height="12" rx="2" fill="none" stroke="#2563eb" stroke-width="1.5"/>
  <text x="68" y="642" fill="#9ca3af" font-size="9">AWS Service</text>
  <rect x="150" y="632" width="12" height="12" rx="2" fill="none" stroke="#10b981" stroke-width="1.5"/>
  <text x="168" y="642" fill="#9ca3af" font-size="9">Lambda Function</text>
  <rect x="280" y="632" width="12" height="12" rx="2" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="298" y="642" fill="#9ca3af" font-size="9">Ephemeral Scan Worker</text>
  <rect x="430" y="632" width="12" height="12" rx="2" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <text x="448" y="642" fill="#9ca3af" font-size="9">Security Check Modules</text>
  <rect x="590" y="632" width="12" height="12" rx="2" fill="none" stroke="#ec4899" stroke-width="1.5"/>
  <text x="608" y="642" fill="#9ca3af" font-size="9">LLM Review</text>
  <rect x="700" y="632" width="12" height="12" rx="2" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <text x="718" y="642" fill="#9ca3af" font-size="9">Output / Storage</text>
  <rect x="800" y="632" width="12" height="12" rx="2" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <text x="818" y="642" fill="#9ca3af" font-size="9">Registry / State</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4b5563"/>
    </marker>
    <marker id="arrow-sm" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#374151"/>
    </marker>
  </defs>
</svg>
